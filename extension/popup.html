<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xtra DevPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.9);
      --border: rgba(48, 54, 61, 0.8);
      --text: #c9d1d9;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.4);
      --success: #2ea043;
      --error: #f85149;
    }

    * { box-sizing: border-box; }

    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .container {
      background: var(--card-bg);
      padding: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #1f6feb, var(--accent), #1f6feb);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      background: rgba(46, 160, 67, 0.1);
      color: var(--success);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(46, 160, 67, 0.3);
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .status-badge.disconnected {
      background: rgba(248, 81, 73, 0.1);
      color: var(--error);
      border-color: rgba(248, 81, 73, 0.3);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    .disconnected .status-dot {
      background-color: var(--error);
      box-shadow: 0 0 8px var(--error);
      animation: none;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 160, 67, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(46, 160, 67, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 160, 67, 0); }
    }

    #reconnectBtn {
      display: none;
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.4);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #reconnectBtn:hover {
      background: rgba(88, 166, 255, 0.2);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    
    .actions {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-danger {
      width: 100%;
      padding: 12px;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--error);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-danger:hover {
      background: rgba(248, 81, 73, 0.2);
      border-color: rgba(248, 81, 73, 0.5);
    }

    .footer {
      font-size: 0.75rem;
      color: #8b949e;
      text-align: center;
      margin-bottom: 16px;
    }
    
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <img src="icon.png" class="logo-img" alt="Logo">
        Xtra DevPilot
      </div>
      <div>
        <div id="statusIndicator" class="status-badge disconnected">
          <div class="status-dot"></div>
          <span id="statusText">Connecting...</span>
        </div>
        <button id="reconnectBtn">Connect Again</button>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="networkCount">0</div>
        <div class="stat-label">Network</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="consoleCount">0</div>
        <div class="stat-label">Console</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="selectElementBtn" style="width: 100%; padding: 12px; background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.4); color: var(--accent); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;">
      ✏️ Select Element for AI
    </button>
    <button id="manageExtensionBtn" class="btn-danger">
      Turn Off for the Day
    </button>
  </div>

  <div class="footer">
    MCP Bridge Active • <a href="#" id="refreshBtn">Refresh Stats</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
